<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Astro Video Generator</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:36px;width:100%;max-width:480px}
  h2{font-size:22px;margin-bottom:6px;text-align:center}
  .sub{color:#666;font-size:13px;text-align:center;margin-bottom:28px}
  .btn{display:block;width:100%;padding:14px;background:#0066ff;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s;text-align:center}
  .btn:hover:not(:disabled){background:#0052cc}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  #status{display:none;margin-top:20px}
  .bar-wrap{background:#222;border-radius:6px;height:6px;margin:10px 0 6px}
  .bar{background:#0066ff;height:6px;border-radius:6px;width:0%;transition:width .6s}
  .msg{font-size:13px;color:#888}
  #result{display:none;margin-top:20px;text-align:center}
  #result .label{font-size:13px;color:#4caf50;margin-bottom:10px}
  video{width:100%;border-radius:10px;background:#000}
  .dl{display:inline-block;margin-top:12px;padding:10px 24px;background:#1a7f37;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600}
  .dl:hover{background:#156d2e}
  .new{display:inline-block;margin-top:8px;margin-left:10px;padding:10px 24px;background:#333;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
  .new:hover{background:#444}
  .dot{animation:blink 1.2s infinite;display:inline-block}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
</style>
</head>
<body>
<div class="card">
  <h2>Astro Video Generator</h2>
  <p class="sub">Generates a unique random 20s video every time</p>

  <button class="btn" id="btn" onclick="generate()">Generate Video</button>

  <div id="status">
    <div class="msg" id="msg">Starting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  </div>

  <div id="result">
    <div class="label">Your video is ready!</div>
    <video id="vid" controls autoplay playsinline></video>
    <br>
    <a id="dl" class="dl" download="astro-video.mp4">Download MP4</a>
    <button class="new" onclick="reset()">Generate New</button>
  </div>
</div>

<script>
  // ← Paste your Cloudflare Worker URL here
  const PROXY = "https://astro-video-proxy.YOUR-SUBDOMAIN.workers.dev";

  function setBar(p){ document.getElementById('bar').style.width = p+'%'; }
  function setMsg(m){ document.getElementById('msg').innerHTML = m+'<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>'; }

  function reset(){
    document.getElementById('result').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    document.getElementById('btn').disabled = false;
    setBar(0);
  }

  async function generate(){
    document.getElementById('btn').disabled = true;
    document.getElementById('result').style.display = 'none';
    document.getElementById('status').style.display = 'block';
    setBar(5); setMsg('Triggering workflow');

    const startTime = new Date().toISOString();

    const res = await fetch(`${PROXY}/trigger`, { method: 'POST' });
    const data = await res.json();

    if(!data.ok){
      setMsg('Error triggering workflow');
      document.getElementById('btn').disabled = false;
      return;
    }

    setTimeout(()=>{ setBar(15); setMsg('Downloading dataset from Kaggle'); }, 3000);
    setTimeout(()=>{ setBar(40); setMsg('Randomly trimming clips'); },          25000);
    setTimeout(()=>{ setBar(65); setMsg('Merging into 20s video'); },            60000);
    setTimeout(()=>{ setBar(82); setMsg('Uploading to releases'); },             100000);
    setTimeout(()=>{ setBar(90); setMsg('Almost done'); },                       130000);

    pollRelease(startTime);
  }

  async function pollRelease(startTime){
    try {
      const r = await fetch(`${PROXY}/release?since=${encodeURIComponent(startTime)}`);
      const data = await r.json();
      if(data.videoUrl){
        setBar(100);
        document.getElementById('status').style.display = 'none';
        document.getElementById('result').style.display  = 'block';
        document.getElementById('vid').src = data.videoUrl;
        document.getElementById('dl').href = data.videoUrl;
        document.getElementById('btn').disabled = false;
        return;
      }
    } catch(e){}
    setTimeout(() => pollRelease(startTime), 8000);
  }
</script>
</body>
</html>
