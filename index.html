<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Random Video Generator</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:36px;width:100%;max-width:480px}
  h2{font-size:22px;margin-bottom:6px}
  p{color:#888;font-size:14px;margin-bottom:28px}
  label{font-size:13px;color:#aaa;display:block;margin-bottom:6px}
  input{width:100%;padding:10px 14px;background:#111;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;margin-bottom:18px}
  button{width:100%;padding:14px;background:#0066ff;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
  button:hover:not(:disabled){background:#0052cc}
  button:disabled{opacity:.5;cursor:not-allowed}
  #status{margin-top:22px;display:none}
  .bar-wrap{background:#222;border-radius:6px;height:6px;margin:12px 0}
  .bar{background:#0066ff;height:6px;border-radius:6px;width:0;transition:width .4s}
  .msg{font-size:14px;color:#aaa}
  #result{margin-top:18px;display:none}
  video{width:100%;border-radius:10px;margin-top:10px}
  .dl{display:block;text-align:center;margin-top:10px;color:#0066ff;font-size:14px;text-decoration:none}
  .dl:hover{text-decoration:underline}
  .dot{display:inline-block;animation:blink 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
</style>
</head>
<body>
<div class="card">
  <h2>Random Video Generator</h2>
  <p>Merges random clips from the dataset into a unique 20-second video every time.</p>

  <label>GitHub Repo (owner/repo)</label>
  <input id="repo" placeholder="YourName/YourRepo" value="">

  <label>GitHub Token (Actions write permission)</label>
  <input id="token" type="password" placeholder="ghp_...">

  <button id="btn" onclick="generate()">Generate Video</button>

  <div id="status">
    <div class="msg" id="msg">Triggering workflow<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  </div>

  <div id="result">
    <div style="color:#4caf50;font-size:14px;margin-bottom:8px">Video ready!</div>
    <video id="vid" controls autoplay></video>
    <a id="dl" class="dl" download="random-video.mp4">Download MP4</a>
  </div>
</div>

<script>
const STEPS = [
  [5,  "Triggering GitHub Actions workflow..."],
  [15, "Downloading video dataset from Kaggle..."],
  [50, "Trimming & selecting random clips..."],
  [80, "Merging clips into 20s video..."],
  [90, "Uploading to GitHub Releases..."],
  [95, "Waiting for release asset..."],
];

let pollTimer, barTimer, stepIdx = 0;

function setBar(pct){ document.getElementById('bar').style.width = pct+'%'; }
function setMsg(txt){ document.getElementById('msg').innerHTML = txt; }

async function generate(){
  const repo  = document.getElementById('repo').value.trim();
  const token = document.getElementById('token').value.trim();
  if(!repo || !token){ alert('Enter your repo and GitHub token'); return; }

  document.getElementById('btn').disabled = true;
  document.getElementById('status').style.display = 'block';
  document.getElementById('result').style.display  = 'none';
  stepIdx = 0; setBar(0);

  // Trigger workflow
  const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/merge.yml/dispatches`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
    body: JSON.stringify({ref:'main'})
  });

  if(res.status !== 204){
    const e = await res.text();
    setMsg('Error: '+e); document.getElementById('btn').disabled=false; return;
  }

  // Animate progress through fake steps
  animateSteps(token, repo);
}

function animateSteps(token, repo){
  if(stepIdx >= STEPS.length) return;
  const [pct, msg] = STEPS[stepIdx++];
  setBar(pct); setMsg(msg+'<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>');
  const delay = stepIdx === 1 ? 2000 :
                stepIdx === 2 ? 8000 :
                stepIdx === 3 ? 30000 :
                stepIdx === 4 ? 40000 :
                stepIdx === 5 ? 15000 : 10000;
  barTimer = setTimeout(() => animateSteps(token, repo), delay);
  if(stepIdx === 3) startPolling(token, repo);
}

async function startPolling(token, repo){
  // Wait a bit then start polling releases
  await sleep(60000);
  poll(token, repo);
}

async function poll(token, repo){
  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/releases?per_page=1`,{
      headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'}
    });
    const releases = await r.json();
    if(releases.length > 0){
      const latest = releases[0];
      const asset  = (latest.assets||[]).find(a => a.name.endsWith('.mp4'));
      if(asset && asset.browser_download_url){
        clearTimeout(barTimer);
        setBar(100); setMsg('Done!');
        showVideo(asset.browser_download_url, token);
        return;
      }
    }
  } catch(e){}
  pollTimer = setTimeout(() => poll(token, repo), 8000);
}

function showVideo(url, token){
  document.getElementById('result').style.display = 'block';
  document.getElementById('vid').src = url;
  document.getElementById('dl').href = url;
  document.getElementById('btn').disabled = false;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
</script>
</body>
</html>
